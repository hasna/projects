# Local self_hosted stack for projects-serve: a Postgres and the HTTP API.
# Mirrors the cloud (Amendment A1 pure-remote) shape for local testing.
#   docker compose up --build
#   # then: curl localhost:8080/health
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: projects_app
      POSTGRES_PASSWORD: projects_local
      POSTGRES_DB: projects
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projects_app -d projects"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["projects-serve", "migrate"]
    environment:
      HASNA_PROJECTS_DATABASE_URL: postgres://projects_app:projects_local@postgres:5432/projects
      HASNA_PROJECTS_API_SIGNING_KEY: local-dev-signing-secret
    depends_on:
      postgres:
        condition: service_healthy

  serve:
    build: .
    command: ["projects-serve"]
    environment:
      PORT: "8080"
      HOST: 0.0.0.0
      HASNA_PROJECTS_DATABASE_URL: postgres://projects_app:projects_local@postgres:5432/projects
      HASNA_PROJECTS_API_SIGNING_KEY: local-dev-signing-secret
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
